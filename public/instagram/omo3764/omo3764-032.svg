<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식 도형 -->
  <circle cx="930" cy="170" r="260" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>
  <rect x="-40" y="430" width="1160" height="3" fill="#ffffff" opacity="0.18"/>
  <!-- 워드마크 -->
  <text x="90" y="120" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="6" opacity="0.92">PROCARDCRAFTERS</text>
  <!-- 필러 태그 -->
  <text x="990" y="120" text-anchor="end" fill="#ffffff" font-size="24" font-weight="600" opacity="0.8">Quality / Behind-the-Scenes</text>
  <!-- 헤드라인 -->
  <text fill="#ffffff" font-size="78" font-weight="800" letter-spacing="-1"><tspan x="90" y="457">Delivered</tspan><tspan x="90" y="549">worldwide via</tspan><tspan x="90" y="641">FedEx. ✈️</tspan></text>
  <!-- 제품 칩 -->
  <rect x="86" y="900" rx="26" ry="26" width="260" height="52" fill="#ffffff" opacity="0.16"/>
  <text x="110" y="934" fill="#ffffff" font-size="26" font-weight="700">Premium Print</text>
  <!-- CTA -->
  <text x="90" y="1015" fill="#ffffff" font-size="28" font-weight="600" opacity="0.95">Configure &amp; price in seconds — link in bio</text>
  <text x="990" y="1015" text-anchor="end" fill="#ffffff" font-size="24" opacity="0.7">Day 16 · PM</text>
</svg>
